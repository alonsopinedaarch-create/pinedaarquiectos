<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CASA 600</title>
<link rel="stylesheet" href="../styles.css">
</head>

<body>

<header>
<a href="../index.html">← Volver</a>
</header>

<section class="proyecto-detalle">

<h1>CASA AMÉRICAS</h1>

<p>
Casa Américas es un proyecto residencial pensado en el disfrute y la privacidad, con una propuesta de líneas sólidas y un estilo muy característico gracias a sus volúmenes y su celosía que aportan gran visibilidad a la casa.
</p>


<div class="slider">
    <button class="prev"></button>
    <div class="slides-wrapper">

<img class="slide active" src="../assets/images/casaamericas1.jpg" alt="">





</div>

<button class="next"></button>

<!-- indicadores -->
 <div class="dots"></div>

</div>

</section>

<script>
document.addEventListener("DOMContentLoaded", () => {

const slides = document.querySelectorAll(".slide");
const prev = document.querySelector(".prev");
const next = document.querySelector(".next");
const dotsContainer = document.querySelector(".dots");

let index = 0;

// Crear dots
slides.forEach((_, i) => {
const dot = document.createElement("div");
dot.classList.add("dot");
dotsContainer.appendChild(dot);

dot.addEventListener("click", () => {
index = i;
updateSlider();
});
});

const dots = document.querySelectorAll(".dot");

function updateSlider() {
slides.forEach(s => s.classList.remove("active"));
dots.forEach(d => d.classList.remove("active"));

slides[index].classList.add("active");
dots[index].classList.add("active");
}

function nextSlide() {
index = (index + 1) % slides.length;
updateSlider();
}

function prevSlideFn() {
index = (index - 1 + slides.length) % slides.length;
updateSlider();
}

next.addEventListener("click", nextSlide);
prev.addEventListener("click", prevSlideFn);

// SWIPE móvil
let startX = 0;

document.querySelector(".slider").addEventListener("touchstart", e => {
startX = e.touches[0].clientX;
});

document.querySelector(".slider").addEventListener("touchend", e => {
let endX = e.changedTouches[0].clientX;

if (startX - endX > 50) nextSlide();
if (endX - startX > 50) prevSlideFn();
});

updateSlider();

});
</script>


</body>
</html>
